<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotbalový zápisník</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #eeede8;
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #9e9d99;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --info-bg: #e6f1fb;
      --info-text: #185fa5;
      --success-bg: #eaf3de;
      --success-text: #3b6d11;
      --danger-text: #a32d2d;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
        --text: #f0efe9; --text2: #a8a8a2; --text3: #6b6b67;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
        --info-bg: #0c447c; --info-text: #b5d4f4;
        --success-bg: #27500a; --success-text: #c0dd97;
        --danger-text: #f09595;
      }
    }
 
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
    .app { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
 
    .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .tab { padding: 8px 18px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 14px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .tab.active { background: var(--bg2); color: var(--text); font-weight: 500; }
 
    .section { display: none; }
    .section.active { display: block; }
 
    .stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg2); border-radius: var(--radius-md); padding: 1rem; }
    .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .stat-val { font-size: 24px; font-weight: 500; }
 
    .form-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
    .form-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; color: var(--text2); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; color: var(--text2); }
    .form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
    .form-group textarea { resize: vertical; min-height: 60px; }
 
    .photo-upload-area { border: 1.5px dashed var(--border2); border-radius: var(--radius-md); padding: 1.5rem; text-align: center; cursor: pointer; transition: background 0.15s; position: relative; }
    .photo-upload-area:hover { background: var(--bg2); }
    .photo-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; border: none; padding: 0; }
    .upload-icon { font-size: 24px; margin-bottom: 6px; }
    .upload-text { font-size: 13px; color: var(--text2); }
    .upload-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
 
    .photo-preview-wrap { position: relative; }
    .photo-preview-wrap img { width: 100%; max-height: 220px; object-fit: cover; border-radius: var(--radius-md); display: block; }
    .photo-remove { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
 
    .form-actions { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
    .btn-save { padding: 8px 20px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; cursor: pointer; font-weight: 500; font-family: inherit; }
    .btn-save:hover { background: var(--bg3); }
    .btn-cancel { padding: 8px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: transparent; color: var(--text2); font-size: 14px; cursor: pointer; font-family: inherit; }
 
    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-row select { padding: 6px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; }
 
    .match-list { display: flex; flex-direction: column; gap: 10px; }
    .match-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
    .match-card:hover { border-color: var(--border2); }
    .match-thumb { width: 100%; height: 160px; object-fit: cover; display: block; }
    .match-card-body { padding: 1rem 1.25rem; }
    .match-teams { font-size: 15px; font-weight: 500; }
    .match-score {
  font-size: 18px; /* Větší písmo */
  font-weight: 700; /* Extra tučné */
  color: var(--text); /* Výraznější barva než šedá */
  background: var(--bg2); /* Jemné pozadí pod skóre */
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 5px;
}
.match-meta, .match-date {
  font-size: 14px; /* Z 12px na 14px pro lepší čitelnost */
}

.badge {
  display: inline-block;
  font-size: 12px;
  padding: 4px 10px;   /* Trochu víc místa uvnitř odznaku */
  border-radius: var(--radius-md);
  margin-right: 8px;   /* Tato mezera odtlačí název stadionu */
}
    .badge-comp { background: var(--info-bg); color: var(--info-text); }
    .badge-youth { background: var(--success-bg); color: var(--success-text); }
    .match-date { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .match-note { font-size: 13px; color: var(--text2); margin-top: 6px; font-style: italic; }
 
    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-photo { width: 100%; max-height: 300px; object-fit: cover; display: block; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
    .modal-body { padding: 1.25rem; }
    .modal-teams {
  font-size: 22px; /* Pořádný nadpis */
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 8px;
}

.modal-score {
  font-size: 26px; /* Skóre jako dominanta */
  font-weight: 800;
  color: var(--info-text); /* Nebo jakákoliv tvoje barva */
  margin-bottom: 15px;
}
    .modal-meta { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; align-items: center; }
    .modal-date { font-size: 13px; color: var(--text2); }
    .modal-note {
  font-size: 16px; /* Větší text poznámky */
  line-height: 1.5;
  color: var(--text);
}
    .modal-close { position: absolute; top: 10px; right: 12px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-actions { margin-top: 1rem; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-modal-close { padding: 8px 20px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; cursor: pointer; font-family: inherit; }
    .btn-modal-edit { padding: 8px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: transparent; color: var(--text); font-size: 14px; cursor: pointer; font-family: inherit; }
    .btn-modal-del { padding: 8px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: transparent; color: var(--danger-text); font-size: 14px; cursor: pointer; font-family: inherit; }
 
    .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
    .breakdown-label { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; line-height: 1.7; }
 
    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
 
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

</head>
<body>
<div class="app">
  <h1>Fotbalový zápisník</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('history')">Historie</button>
    <button class="tab" onclick="switchTab('add')">Přidat zápas</button>
    <button class="tab" onclick="switchTab('stats')">Statistiky</button>
  </div>
 
  <!-- HISTORIE -->
  <div id="tab-history" class="section active">
    <div class="filter-row">
      <select id="filter-comp" onchange="renderList()">
        <option value="">Všechny soutěže</option>
        <option>1. liga</option><option>2. liga</option><option>3. liga</option><option>4. liga</option><option>5. liga</option>
        <option>Krajský přebor</option><option>1. A třída</option><option>1. B třída</option>
        <option>Okresní přebor</option><option>Nižší soutěže</option>
        <option>Mládežnická soutěž</option><option>MOL Cup</option><option>Jiný pohár</option>
      </select>
      <select id="filter-sort" onchange="renderList()">
        <option value="newest">Nejnovější zápasy (podle data)</option>
        <option value="oldest">Nejstarší zápasy (podle data)</option>
        <option value="added">Podle pořadí přidání</option>
      </select>
    </div>
    <div id="match-list" class="match-list"></div>
  </div>
 
  <!-- PŘIDAT / UPRAVIT ZÁPAS -->
  <div id="tab-add" class="section">
    <div class="form-card">
      <div class="form-title" id="form-title">Nový zápas</div>
      <div class="form-group full">
        <label>Sport</label>
        <select id="f-sport" onchange="updateAutocomplete()">
          <option value="fotbal">⚽ Fotbal</option>
          <option value="hokej">🏒 Hokej</option>
          <option value="tenis">🎾 Tenis</option>
          <option value="basketbal">🏀 Basketbal</option>
          <option value="ostatni">🏆 Ostatní</option>
        </select>
      </div>
      <div class="form-grid">
<div class="form-group">
  <label>Domácí tým</label>
  <input type="text" id="f-home" list="teams-list" placeholder="např. FC Kyjov 1919" />
</div>
<div class="form-group">
  <label>Hosté</label>
  <input type="text" id="f-away" list="teams-list" placeholder="např. SK Slavia Praha" />
</div>

<datalist id="teams-list"></datalist>
        <div class="form-group">
          <label>Výsledek (nepovinné)</label>
          <input type="text" id="f-score" placeholder="např. 2:1" />
        </div>
        <div class="form-group">
          <label>Datum</label>
          <input type="date" id="f-date" />
        </div>
        <div class="form-group">
          <label>Soutěž</label>
          <select id="f-comp">
            <option>1. liga</option><option>2. liga</option><option>3. liga</option><option>4. liga</option><option>5. liga</option>
            <option>Krajský přebor</option><option>1. A třída</option><option>1. B třída</option>
            <option>Okresní přebor</option><option>Nižší soutěže</option>
            <option>Mládežnická soutěž</option><option>MOL Cup</option><option>Jiný pohár</option>
          </select>
        </div>
        <div class="form-group">
          <label>Hřiště / Stadion (nepovinné)</label>
          <input type="text" id="f-venue" placeholder="např. Bazaly" />
        </div>
        <div class="form-group full">
          <label>Fotografie ze stadionu (nepovinné)</label>
          <div id="photo-area">
            <div class="photo-upload-area">
              <input type="file" accept="image/*" onchange="handlePhoto(this)" />
              <div class="upload-icon">📷</div>
              <div class="upload-text">Klikni nebo přetáhni fotografii</div>
              <div class="upload-hint">JPG, PNG, WEBP – automaticky zkomprimováno</div>
            </div>
          </div>
        </div>
        <div class="form-group full">
          <label>Poznámka (nepovinné)</label>
          <textarea id="f-note" placeholder="Tvůj dojem ze zápasu..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-save" id="btn-submit" onclick="saveMatch()">Uložit zápas</button>
        <button class="btn-cancel" onclick="cancelEdit()">Zrušit</button>
      </div>
    </div>
  </div>
 
  <!-- STATISTIKY -->
  <div id="tab-stats" class="section">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Celkem zápasů</div><div class="stat-val" id="s-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Různých stadionů</div><div class="stat-val" id="s-venues">0</div></div>
      <div class="stat-card"><div class="stat-label">Různých soutěží</div><div class="stat-val" id="s-comps">0</div></div>
    </div>
    <div id="stats-breakdown"></div>
    <div class="form-card" style="margin-top: 2rem;">
        <div class="form-title">Správa dat (Záloha)</div>
        <div class="form-actions">
          <button class="btn-save" onclick="exportData()">Exportovat (Stáhnout JSON)</button>
          <label class="btn-cancel" style="display: inline-block; cursor: pointer; border: 0.5px solid var(--border2); padding: 8px 16px; border-radius: var(--radius-md);">
            Importovat soubor
            <input type="file" id="import-file" accept=".json" onchange="importData(this)" style="display: none;">
          </label>
        </div>
        <div class="upload-hint" style="margin-top: 10px;">
          Export vytvoří soubor .json, který si můžeš uložit. Importem nahradíš aktuální data v zápisníku.
        </div>
      </div>
  </div>
</div>
 
<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modal-photo" class="modal-photo" src="" alt="" style="display:none" />
    <div class="modal-body">
      <div class="modal-teams" id="modal-teams"></div>
      <div class="modal-score" id="modal-score"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-date" id="modal-date"></div>
      <div id="modal-note"></div>
      <div class="modal-actions">
        <button class="btn-modal-close" onclick="closeModal()">Zavřít</button>
        <button class="btn-modal-share" onclick="shareMatchCard()" style="padding: 8px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: #3b6d11; color: white; font-size: 14px; cursor: pointer; font-family: inherit;">Sdílet jako obrázek</button> 
        <button class="btn-modal-edit" onclick="startEdit()">Upravit</button>
        <button class="btn-modal-del" onclick="deleteFromModal()">Smazat</button>
      </div>
    </div>
  </div>
</div>
 
<script>
  let matches = [];
  let currentPhoto = null;
  let editingId = null;
  let openMatchId = null;
 
  const COMPS = ['1. liga','2. liga','3. liga','4. liga','5. liga','Krajský přebor','1. A třída','1. B třída','Okresní přebor','Nižší soutěže','Mládežnická soutěž','MOL Cup','Jiný pohár'];
 // Funkce pro stažení dat do souboru
function exportData() {
  if (matches.length === 0) {
    alert("Nemáš žádná data k exportu.");
    return;
  }
  const dataStr = JSON.stringify(matches, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
  
  const exportFileDefaultName = 'fotbalovy-zapisnik-zaloha.json';
  
  const linkElement = document.createElement('a');
  linkElement.setAttribute('href', dataUri);
  linkElement.setAttribute('download', exportFileDefaultName);
  linkElement.click();
}

// Funkce pro načtení dat ze souboru
function importData(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importedMatches = JSON.parse(e.target.result);
      if (Array.isArray(importedMatches)) {
        if (confirm(`Opravdu chceš importovat ${importedMatches.length} zápasů? Současná data budou přepsána.`)) {
          matches = importedMatches;
          saveData();
          renderList();
          renderStats();
          alert("Import byl úspěšný!");
        }
      } else {
        alert("Neplatný formát souboru.");
      }
    } catch (err) {
      alert("Chyba při čtení souboru: " + err.message);
    }
  };
  reader.readAsText(file);
}
  function loadData() {
    try { const r = localStorage.getItem('fotbal-matches'); if (r) matches = JSON.parse(r); } catch(e) { matches = []; }
    renderList(); renderStats();
  }
 
  function saveData() { localStorage.setItem('fotbal-matches', JSON.stringify(matches)); }
 
  function switchTab(name) {
    const names = ['history','add','stats'];
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i] === name));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'stats') renderStats();
    if (name === 'history') renderList();
  }
 // --- FUNKCE PRO GENEROVÁNÍ A STAŽENÍ OBRÁZKU ZÁPASU ---
function shareMatchCard() {
  if (!openMatchId) return; // Ujistíme se, že máme otevřený zápas
  
  const m = matches.find(x => x.id === openMatchId);
  if (!m) return;

  const modalBody = document.querySelector('#modal .modal-body');
  
  // Dočasně skryjeme tlačítka v modalu, aby nebyla na fotce
  const actions = modalBody.querySelector('.modal-actions');
  actions.style.display = 'none';

  // Použijeme html2canvas k "vyfocení" obsahu modalu
  html2canvas(modalBody, {
    backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg'), // Použije aktuální barvu pozadí (světlá/tmavá)
    scale: 2, // Zvýšíme rozlišení obrázku (bude ostřejší)
    logging: false, // Vypne logování do konzole
    useCORS: true // Důležité, pokud bys někdy načítal fotky z jiné domény
  }).then(canvas => {
    // Vrátíme tlačítka zpět
    actions.style.display = 'flex';

    // Převedeme canvas na URL obrázku (PNG)
    const image = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");
    
    // Vytvoříme název souboru
    const fileName = `zapas_${m.home.toLowerCase()}_${m.away.toLowerCase()}_${m.date}.png`.replace(/[^a-z0-9_.]/gi, '_');

    // Vytvoříme skrytý odkaz a simulujeme kliknutí pro stažení
    const link = document.createElement('a');
    link.download = fileName;
    link.href = image;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
}
  function compressImage(file, cb) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const MAX = 900;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
 
  function handlePhoto(input) {
    const file = input.files[0];
    if (!file) return;
    compressImage(file, function(data) {
      currentPhoto = data;
      showPhotoPreview(data);
    });
  }
 
  function showPhotoPreview(src) {
    document.getElementById('photo-area').innerHTML =
      '<div class="photo-preview-wrap">' +
        '<img src="' + src + '" alt="náhled" />' +
        '<button class="photo-remove" onclick="removePhoto()">✕</button>' +
      '</div>';
  }
 
  function removePhoto() {
    currentPhoto = null;
    document.getElementById('photo-area').innerHTML =
      '<div class="photo-upload-area">' +
        '<input type="file" accept="image/*" onchange="handlePhoto(this)" />' +
        '<div class="upload-icon">📷</div>' +
        '<div class="upload-text">Klikni nebo přetáhni fotografii</div>' +
        '<div class="upload-hint">JPG, PNG, WEBP – automaticky zkomprimováno</div>' +
      '</div>';
  }
 
  function saveMatch() {
  const home = document.getElementById('f-home').value.trim();
  const away = document.getElementById('f-away').value.trim();
  if (!home || !away) { alert('Zadej prosím oba týmy.'); return; }

  const data = {
    home, 
    away,
    sport: document.getElementById('f-sport').value, // <-- TENTO ŘÁDEK PŘIDEJ
    score: document.getElementById('f-score').value.trim(),
    date: document.getElementById('f-date').value,
    comp: document.getElementById('f-comp').value,
    venue: document.getElementById('f-venue').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    photo: currentPhoto
  };

  // ... zbytek funkce saveMatch (editingId atd.) zůstává stejný ...
    if (editingId !== null) {
      const idx = matches.findIndex(m => m.id === editingId);
      if (idx !== -1) {
        if (currentPhoto === null && matches[idx].photo) data.photo = matches[idx].photo;
        matches[idx] = Object.assign({}, matches[idx], data);
      }
      editingId = null;
    } else {
      data.id = Date.now();
      if (currentPhoto === null) data.photo = null;
      matches.unshift(data);
    }
    saveData();
    clearForm();
    updateAutocomplete(); // Aktualizuje seznam, pokud jsi zadal nový tým
    switchTab('history');
  }
 
  function clearForm() {
    ['f-home','f-away','f-score','f-venue','f-note'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-sport').value = 'fotbal';
    document.getElementById('f-date').value = today();
    document.getElementById('f-comp').value = COMPS[0];
    document.getElementById('form-title').textContent = 'Nový zápas';
    document.getElementById('btn-submit').textContent = 'Uložit zápas';
    editingId = null;
    currentPhoto = null;
    removePhoto();
  }
 
  function cancelEdit() {
    clearForm();
    if (editingId !== null) { editingId = null; switchTab('history'); }
    else { switchTab('history'); }
  }
 
  function startEdit() {
    const m = matches.find(x => x.id === openMatchId);
    if (!m) return;
    closeModal();
    editingId = m.id;
    document.getElementById('f-home').value = m.home;
    document.getElementById('f-away').value = m.away;
    document.getElementById('f-score').value = m.score || '';
    document.getElementById('f-date').value = m.date || '';
    document.getElementById('f-comp').value = m.comp;
    document.getElementById('f-venue').value = m.venue || '';
    document.getElementById('f-note').value = m.note || '';
    document.getElementById('form-title').textContent = 'Upravit zápas';
    document.getElementById('btn-submit').textContent = 'Uložit změny';
    currentPhoto = m.photo || null;
    if (m.photo) { showPhotoPreview(m.photo); }
    else { removePhoto(); }
    switchTab('add');
  }
 
  function openModal(id) {
    const m = matches.find(x => x.id === id);
    if (!m) return;
    openMatchId = id;
    const ph = document.getElementById('modal-photo');
    if (m.photo) { ph.src = m.photo; ph.style.display = 'block'; } else { ph.style.display = 'none'; }
    document.getElementById('modal-teams').textContent = getSportEmoji(m.sport) + ' ' + m.home + ' – ' + m.away;
    document.getElementById('modal-score').textContent = m.score || '';
    document.getElementById('modal-meta').innerHTML =
      '<span class="badge ' + (m.comp.includes('Mládež') ? 'badge-youth' : 'badge-comp') + '">' + esc(m.comp) + '</span>' +
      (m.venue ? '<span style="font-size:13px;color:var(--text2)">' + esc(m.venue) + '</span>' : '');
    document.getElementById('modal-date').textContent = m.date ? formatDate(m.date) : '';
    const noteEl = document.getElementById('modal-note');
    if (m.note) { noteEl.className = 'modal-note'; noteEl.textContent = m.note; }
    else { noteEl.className = ''; noteEl.textContent = ''; }
    document.getElementById('modal-overlay').classList.add('open');
  }
 
  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); openMatchId = null; }
  function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
 
  function deleteFromModal() {
    if (!openMatchId) return;
    if (!confirm('Opravdu smazat tento zápas?')) return;
    matches = matches.filter(m => m.id !== openMatchId);
    saveData(); closeModal(); renderList(); renderStats();
    
  }
 
  function renderList() {
  const comp = document.getElementById('filter-comp').value;
  const sort = document.getElementById('filter-sort').value;
  
  // 1. Filtrování podle soutěže (to už máš)
  let list = comp ? matches.filter(m => m.comp === comp) : [...matches];

  // 2. Logika řazení
  if (sort === 'newest') {
    // Seřadit od nejnovějšího data (např. 2024-12-31 bude nahoře)
    list.sort((a, b) => new Date(b.date) - new Date(a.date));
  } 
  else if (sort === 'oldest') {
    // Seřadit od nejstaršího data
    list.sort((a, b) => new Date(a.date) - new Date(b.date));
  }
  else if (sort === 'added') {
    // Ponechat původní pořadí (tak, jak jsi je vkládal)
    // Nemusíme dělat nic, nebo použít: list = [...list];
  }

  const el = document.getElementById('match-list');
    if (!list.length) { el.innerHTML = '<div class="empty">Žádné zápasy k zobrazení.<br>Přidej první zápas!</div>'; return; }
    el.innerHTML = list.map(m =>
      '<div class="match-card" onclick="openModal(' + m.id + ')">' +
        (m.photo ? '<img class="match-thumb" src="' + m.photo + '" alt="foto" />' : '') +
        '<div class="match-card-body">' +
            '<div class="match-teams">' + getSportEmoji(m.sport) + ' ' + esc(m.home) + ' – ' + esc(m.away) +
        (m.score ? ' <span class="match-score">' + esc(m.score) + '</span>' : '') + '</div>' +
          '<div class="match-meta">' +
            '<span class="badge ' + (m.comp.includes('Mládež') ? 'badge-youth' : 'badge-comp') + '">' + esc(m.comp) + '</span>' +
            (m.venue ? '<span style="font-size:12px;color:var(--text2)">' + esc(m.venue) + '</span>' : '') +
          '</div>' +
          (m.date ? '<div class="match-date">' + formatDate(m.date) + '</div>' : '') +
          (m.note ? '<div class="match-note">' + esc(m.note) + '</div>' : '') +
        '</div>' +
      '</div>'
    ).join('');
  }
 
  function renderStats() {
    const total = matches.length;
    const venues = new Set(matches.map(m => m.venue).filter(Boolean)).size;
    const comps = new Set(matches.map(m => m.comp)).size;
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-venues').textContent = venues;
    document.getElementById('s-comps').textContent = total > 0 ? comps : 0;
    const byComp = {};
    matches.forEach(m => { byComp[m.comp] = (byComp[m.comp] || 0) + 1; });
    const sorted = Object.entries(byComp).sort((a,b) => b[1]-a[1]);
    const el = document.getElementById('stats-breakdown');
    if (!sorted.length) { el.innerHTML = '<div class="empty">Zatím žádná data.</div>'; return; }
    el.innerHTML = '<div class="breakdown-label">Zápasy podle soutěže</div>' +
      sorted.map(([c,n]) => '<div class="breakdown-row"><span>' + esc(c) + '</span><span style="font-weight:500">' + n + '</span></div>').join('');
  }
